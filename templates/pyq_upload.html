{% load static %}

<div class="card-glass" style="margin:1rem 0; padding:1.1rem;">
  <h2 style="font-size:1rem; margin:0 0 .75rem;">➕ Upload PYQ</h2>
  <form method="post" action="{% url 'upload_pyq' %}" enctype="multipart/form-data" style="display:grid; gap:.75rem;">


    {% csrf_token %}
    <input class="field" name="subject" placeholder="Subject" required>
    <select class="field" name="branch" id="pyq-branch" required></select>
    <input class="field" type="number" name="semester" min="1" max="8" placeholder="Semester" required>
    <input class="field" type="number" name="year" min="1990" max="2100" placeholder="Year" required>
    <select class="field" name="exam_type" required>
      <option value="mid">Mid-Sem</option>
      <option value="end">End-Sem</option>
      <option value="back">Backlog</option>
    </select>
    <input class="field" name="pdf_link" placeholder="PDF link (optional)" >
    <!-- <input class="field" type="file" name="pdf_file" accept="application/pdf"> -->
    <button class="btn btn-primary" type="submit">Upload</button>
  </form>
</div>
